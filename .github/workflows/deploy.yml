name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # add CI job names here once you're confident, e.g. [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan 162.55.208.247 >> ~/.ssh/known_hosts
          ssh-keyscan -H 162.55.208.247 >> ~/.ssh/known_hosts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write secret files
        run: |
          echo "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key
          echo "${{ secrets.POSTGRES_PASSWORD }}" > config/postgres_password
          echo "${{ secrets.TMDB_TOKEN }}" > config/tmdb_token

      - name: Run Kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: bin/kamal deploy
